<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Calculez et suivez automatiquement vos indemnités kilométriques selon le barème URSSAF 2026. Gratuit et conforme.">
  <meta name="theme-color" content="#2661D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="IKtracker">
  
  <!-- Open Graph / Social -->
  <meta property="og:title" content="IKtracker - Indemnités Kilométriques">
  <meta property="og:description" content="Suivez vos indemnités kilométriques facilement">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://iktracker.fr">
  <meta property="og:image" content="/pwa-icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon-192.png">
  <link rel="apple-touch-icon" href="/pwa-icon-192.png">
  
  <!-- Manifest -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- Préchargement des ressources critiques -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://*.supabase.co">

  <title>IKtracker - Calcul automatique des indemnités kilométriques</title>
  
  <style>
    /* Styles critiques inline pour le First Contentful Paint */
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .splash { background: #2661D9; color: white; padding: 2rem; border-radius: 1rem; text-align: center; }
  </style>
</head>
<body>
  <!-- Écran de chargement (affiché avant le chargement de l'app) -->
  <div id="splash-screen" class="loading">
    <div class="splash">
      <h1>🚗 IKtracker</h1>
      <p>Chargement de votre espace...</p>
    </div>
  </div>

  <!-- Contenu principal de l'application -->
  <div id="app" hidden>
    <!-- Votre application React/Vue/HTML sera montée ici -->
  </div>

  <!-- Script d'installation PWA -->
  <script>
    // Gestion de l'installation PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Vous pouvez afficher un bouton "Installer" ici
      console.log('PWA prête à être installée');
    });

    // Fonction pour déclencher l'installation (à appeler depuis un bouton)
    window.installPWA = async () => {
      if (!deferredPrompt) return false;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      return outcome === 'accepted';
    };

    // Supprimer l'écran de chargement quand l'app est prête
    window.appReady = () => {
      document.getElementById('splash-screen').style.display = 'none';
      document.getElementById('app').hidden = false;
    };
  </script>

  <!-- Enregistrement du Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
          console.log('✅ Service Worker enregistré:', registration.scope);
          
          // Vérifier les mises à jour
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Nouvelle version disponible
                if (confirm('Une nouvelle version est disponible. Recharger ?')) {
                  window.location.reload();
                }
              }
            });
          });
        } catch (error) {
          console.error('❌ Échec de l\'enregistrement du SW:', error);
        }
      });
    }

    // Gestion du mode hors-ligne
    window.addEventListener('offline', () => {
      console.log('📴 Mode hors-ligne activé');
      // Afficher un indicateur visuel si nécessaire
    });
    window.addEventListener('online', () => {
      console.log('📶 Connexion rétablie');
    });
  </script>
</body>
</html>
